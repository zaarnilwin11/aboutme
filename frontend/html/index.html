<!DOCTYPE html><html lang="en"><head>
<meta charset="UTF-8"><title>POS Login</title>
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
body{font-family:sans-serif;background:#eee;}
.c{max-width:340px;margin:60px auto;padding:1.5em 2em;background:#fff;border-radius:8px;box-shadow:0 2px 6px #bbb;}
h2{text-align:center;}
input,button{width:100%;padding:.8em;margin:.5em 0;border:1px solid #ccc;border-radius:4px;}
button{background:#007bff;color:#fff;}
.s{text-align:center;}
a{color:#07f;cursor:pointer;}
</style>
<script>
function $(i){return document.getElementById(i);}
function f(s){$('login').style.display=s?'none':'block';$('signup').style.display=s?'block':'none';}
</script>
</head>
<body>
<div class="c">
<h2>POS Login</h2>
<form id="login" method="POST" action="/backend/php/auth/login.php">
<input name="username" placeholder="Username/Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign In</button>
<div class="s">New user? <a onclick="f(1)">Sign Up</a></div>
</form>
<form id="signup" method="POST" action="/backend/php/auth/signup.php" style="display:none">
<input name="username" placeholder="Username" required>
<input type="email" name="email" placeholder="Email" required>
<input type="password" name="password" placeholder="Password" required>
<button type="submit">Sign Up</button>
<div class="s">Have account? <a onclick="f(0)">Sign In</a></div>
</form>
</div>
</body></html>
